<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#ffffff"/>
  <style>.t{font:700 48px 'DejaVu Sans',sans-serif;fill:#172033}.h{font:700 29px 'DejaVu Sans',sans-serif;fill:#172033}.b{font:25px 'DejaVu Sans',sans-serif;fill:#334155}.n{font:700 30px 'DejaVu Sans',sans-serif;fill:white}</style>
  <text x="800" y="80" text-anchor="middle" class="t">¿Qué tienes registrado actualmente?</text>
  <g><rect x="130" y="150" width="1340" height="180" rx="28" fill="#eef5ff" stroke="#4f7ecb" stroke-width="4"/><circle cx="215" cy="240" r="48" fill="#4f7ecb"/><text x="215" y="251" text-anchor="middle" class="n">1</text><text x="295" y="218" class="h">No tengo Source, PDF ni conceptos</text><text x="295" y="270" class="b">Primera acción: crear la Source.</text><text x="1250" y="250" class="h" fill="#2459a6">Ver recorrido →</text></g>
  <g><rect x="130" y="370" width="1340" height="180" rx="28" fill="#fff6e7" stroke="#d58b27" stroke-width="4"/><circle cx="215" cy="460" r="48" fill="#d58b27"/><text x="215" y="471" text-anchor="middle" class="n">2</text><text x="295" y="438" class="h">Tengo Source y PDF, pero no conceptos</text><text x="295" y="490" class="b">Primera acción: leer; puedes marcar antes de crear el concepto.</text><text x="1250" y="470" class="h" fill="#9a5a00">Ver recorrido →</text></g>
  <g><rect x="130" y="590" width="1340" height="180" rx="28" fill="#edf9f1" stroke="#3b9b65" stroke-width="4"/><circle cx="215" cy="680" r="48" fill="#3b9b65"/><text x="215" y="691" text-anchor="middle" class="n">3</text><text x="295" y="658" class="h">Tengo Source y conceptos, pero no PDF</text><text x="295" y="710" class="b">Primera acción: agregar el PDF desde Documents.</text><text x="1250" y="690" class="h" fill="#227347">Ver recorrido →</text></g>
  <text x="800" y="840" text-anchor="middle" class="b">Si ya tienes todo: Biblioteca → Leer → abrir PDF → guardar marca → Asociar concepto.</text>
</svg>
