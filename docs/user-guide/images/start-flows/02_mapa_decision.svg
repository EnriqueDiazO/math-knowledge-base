<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <rect width="1600" height="1100" fill="#ffffff"/>
  <style>.t{font:700 44px 'DejaVu Sans',sans-serif;fill:#172033}.h{font:700 27px 'DejaVu Sans',sans-serif;fill:#172033}.b{font:23px 'DejaVu Sans',sans-serif;fill:#334155}.yes{font:700 21px 'DejaVu Sans',sans-serif;fill:#23734a}.no{font:700 21px 'DejaVu Sans',sans-serif;fill:#a33a3a}.a{stroke:#64748b;stroke-width:5;fill:none;marker-end:url(#m)}</style>
  <defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#64748b"/></marker></defs>
  <text x="800" y="65" text-anchor="middle" class="t">Mapa de decisión</text>
  <rect x="580" y="110" width="440" height="100" rx="24" fill="#eef5ff" stroke="#4f7ecb" stroke-width="4"/><text x="800" y="173" text-anchor="middle" class="h">¿Existe la Source?</text>
  <path d="M670 210 L360 310" class="a"/><text x="465" y="258" class="no">NO</text>
  <path d="M930 210 L1240 310" class="a"/><text x="1090" y="258" class="yes">SÍ</text>
  <rect x="120" y="320" width="480" height="115" rx="22" fill="#fff1f1" stroke="#c85b5b" stroke-width="4"/><text x="360" y="370" text-anchor="middle" class="h">Crear Source</text><text x="360" y="405" text-anchor="middle" class="b">Puede guardarse sin PDF.</text>
  <rect x="1000" y="320" width="480" height="115" rx="22" fill="#edf9f1" stroke="#3b9b65" stroke-width="4"/><text x="1240" y="390" text-anchor="middle" class="h">¿Tiene PDF?</text>
  <path d="M360 435 L360 560" class="a"/><text x="375" y="510" class="b">¿Tienes PDF?</text>
  <rect x="120" y="575" width="480" height="110" rx="22" fill="#fff6e7" stroke="#d58b27" stroke-width="4"/><text x="360" y="640" text-anchor="middle" class="h">Sí: agregarlo · No: después</text>
  <path d="M1150 435 L930 560" class="a"/><text x="995" y="505" class="no">NO</text>
  <path d="M1330 435 L1430 560" class="a"/><text x="1370" y="505" class="yes">SÍ</text>
  <rect x="700" y="575" width="460" height="110" rx="22" fill="#fff6e7" stroke="#d58b27" stroke-width="4"/><text x="930" y="640" text-anchor="middle" class="h">Agregar PDF en Documents</text>
  <rect x="1200" y="575" width="300" height="110" rx="22" fill="#eef5ff" stroke="#4f7ecb" stroke-width="4"/><text x="1350" y="625" text-anchor="middle" class="h">Abrir Biblioteca</text><text x="1350" y="660" text-anchor="middle" class="b">y comenzar a leer</text>
  <path d="M1350 685 L1110 790" class="a"/>
  <rect x="850" y="800" width="520" height="105" rx="22" fill="#f4f0ff" stroke="#7c5ac7" stroke-width="4"/><text x="1110" y="865" text-anchor="middle" class="h">¿Existe el concepto?</text>
  <path d="M1010 905 L810 995" class="a"/><text x="870" y="962" class="no">NO</text>
  <path d="M1210 905 L1410 995" class="a"/><text x="1320" y="962" class="yes">SÍ</text>
  <text x="650" y="1045" class="h">Crear concepto</text><text x="1480" y="1045" text-anchor="end" class="h">Asociarlo con una marca</text>
</svg>
